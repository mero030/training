<script>
// ─────────────────────────────────────────────
// FIX 1: SIMPLE + CORRECT SESSION SYSTEM
// ─────────────────────────────────────────────

function todayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// REMOVE ALL SESSION LOCKING (BUG SOURCE)
// activeKey is now ALWAYS today
function activeKey(){
  return todayKey();
}

// ─────────────────────────────────────────────
// FIX 2: REMOVE BROKEN LOCK FUNCTIONS
// ─────────────────────────────────────────────

// DELETE THESE LOGICALLY (no-op replacements)
function lockSessionDate(){}
function unlockSessionDate(){}

// ─────────────────────────────────────────────
// FIX 3: FIX addSet (NO LOCKING ANYMORE)
// ─────────────────────────────────────────────
function addSet(id){
  const d=dl();
  if(!d[id])d[id]=[];
  d[id].push({reps:"",weight:"",note:"",done:false});

  const t=activeKey();
  const dk=curDayKey();

  if(!logs[t])logs[t]={};
  if(!logs[t]._meta)logs[t]._meta={};
  if(!logs[t]._meta[dk])logs[t]._meta[dk]={start:Date.now(),variant};

  save();
  renderToday();
}

// ─────────────────────────────────────────────
// FIX 4: STOPWATCH FIX (REMOVE SESSION LOCK CALL)
// ─────────────────────────────────────────────
function swToggle(){
  if(swRunning){
    swSavedMs=swGetElapsed();
    swRunning=false;
    cancelAnimationFrame(swRaf);

    document.getElementById("sw-toggle").textContent="START";
    document.getElementById("sw-toggle").className="sw-btn go";

    const t=activeKey();
    const dk=curDayKey();

    if(!logs[t])logs[t]={};
    if(!logs[t]._meta)logs[t]._meta={};
    if(!logs[t]._meta[dk])logs[t]._meta[dk]={};

    logs[t]._meta[dk].durationMs=swSavedMs;

    save();
  }else{
    swStartEpoch=Date.now();
    swRunning=true;

    document.getElementById("sw-toggle").textContent="STOP";
    document.getElementById("sw-toggle").className="sw-btn stop";

    swTick();
  }
}

// ─────────────────────────────────────────────
// FIX 5: HISTORY FILTER FIX (IMPORTANT)
// ─────────────────────────────────────────────
function renderHist(){
  const c=P[histDay].color;

  const hist=Object.entries(logs)
    .filter(([dt,data])=>{
      const a=data[histDay]||{};
      const b=data[histDay+"_alt"]||{};
      return (
        Object.keys(a).some(k=>k!=="_meta") ||
        Object.keys(b).some(k=>k!=="_meta")
      );
    })
    .sort(([a],[b])=>b.localeCompare(a))
    .slice(0,15);

  const el=document.getElementById("hist-content");

  if(!hist.length){
    el.innerHTML=`<div class="no-hist">No sessions logged yet.</div>`;
    return;
  }

  let html="";

  hist.forEach(([dt,data])=>{
    const d=new Date(dt+"T12:00:00");
    const lbl=d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});

    const sd=data[histDay]||{};
    const allIds=Object.keys(sd).filter(id=>id!=="_meta");

    html+=`<div class="hsession">
      <div class="hshdr">
        <div class="hsdate">${lbl}</div>
        <div class="hscount">${allIds.length} EX</div>
      </div>`;

    allIds.forEach(id=>{
      const ss=sd[id]||[];

      html+=`<div class="hex">
        <div class="hexname">${id}</div>
        <div class="hsets">`;

      ss.forEach(s=>{
        const txt=[s.reps,s.note].filter(Boolean).join(" · ");
        html+=`<div class="hpill">${txt||"—"}</div>`;
      });

      html+=`</div></div>`;
    });

    html+=`</div>`;
  });

  el.innerHTML=html;
}
